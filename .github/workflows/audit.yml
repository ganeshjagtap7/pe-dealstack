name: Dependency Audit

on:
  pull_request:
    branches:
      - main
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --include=dev
      # Threshold = critical (NOT high). Reason: xlsx has unresolved high-
      # severity advisories with no fix available, plus chain through
      # resend/svix/uuid. Failing PRs on those keeps people from merging
      # legitimate work. Critical-only blocks merges; everything else still
      # shows up in the job output for visibility.
      - name: npm audit (fail only on critical)
        run: npm audit --audit-level=critical --workspaces --include-workspace-root
