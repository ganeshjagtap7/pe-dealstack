name: PR Validation

on:
  pull_request:
    branches:
      - main

# Explicit minimum permissions. Default workflow token was tightened by
# GitHub in 2024 — runs from PR authors who aren't repo owners can fail
# at actions/checkout when the token doesn't have explicit `contents: read`.
# Declaring it here avoids that failure mode without granting any extra
# write access. Pull-request: read is needed so the checkout action can
# resolve the PR's head SHA correctly.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --include=dev
      - name: Build api (dist needed for web-next dynamic import resolution)
        run: npm run build:api
      - name: Typecheck both apps
        run: |
          cd apps/api && npx tsc --noEmit
          cd ../web-next && npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --include=dev
      - name: Lint web-next
        run: cd apps/web-next && npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --include=dev
      - name: Build api then web-next (Vercel parity)
        run: |
          npm run build:api
          cd apps/web-next && npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install --include=dev
      - name: Run web-next tests (vitest tolerates zero tests)
        run: cd apps/web-next && npm run test -- --passWithNoTests
