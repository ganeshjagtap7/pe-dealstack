<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Due Diligence VDR - PE OS</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css" />
</head>
  <body class="bg-background-light text-text-main font-sans overflow-hidden h-screen flex">
    <!-- PE OS Sidebar (injected by layout.js) -->
    <div id="sidebar-root"></div>

    <!-- React VDR App Root -->
    <div id="root" class="flex-1 flex overflow-hidden"></div>

    <!-- Load shared layout -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/layoutComponents.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/docPreview-modal.js"></script>
    <script src="js/docPreview.js"></script>
    <script src="js/shareModal.js"></script>
    <script src="js/inviteModal-template.js"></script>
    <script src="js/inviteModal.js"></script>
    <script>
      // Initialize PE OS Layout with collapsible sidebar
      document.addEventListener('DOMContentLoaded', async function() {
        // Initialize auth and check if user is logged in
        await PEAuth.initSupabase();
        const auth = await PEAuth.checkAuth();
        if (!auth) return; // Will redirect to login

        PELayout.init('data-room', { collapsible: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
