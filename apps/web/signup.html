<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create your workspace — PE OS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" />
<style>
  body { font-feature-settings: "cv11", "ss01"; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="bg-background-body text-text-main font-sans min-h-screen flex flex-col">

<!-- Loading Screen -->
<div id="loadingScreen" class="fixed inset-0 bg-background-body flex items-center justify-center z-50">
  <div class="flex flex-col items-center gap-3">
    <div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
    <span class="text-sm text-text-muted">Loading...</span>
  </div>
</div>

<!-- Top Nav -->
<header class="bg-white border-b border-border-subtle">
  <div class="max-w-6xl mx-auto px-6 py-3.5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 12L12 22L22 12L12 2Z" fill="#003366"/>
      </svg>
      <span class="font-display font-bold text-[15px] tracking-tight text-primary">PE OS</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-[13px] text-text-secondary hidden sm:inline">Already have an account?</span>
      <a href="login.html" class="text-[13px] font-semibold text-primary hover:text-primary-hover transition">Log in</a>
    </div>
  </div>
</header>

<!-- Main -->
<main class="flex-1 flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-[440px]">

    <!-- Header -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center gap-2 px-2.5 py-1 rounded-full bg-primary-light text-primary text-[11px] font-semibold uppercase tracking-wider mb-5">
        <span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
        Secure registration
      </div>
      <h1 class="font-display text-[32px] leading-[1.15] font-bold tracking-tight text-text-main">
        Create your workspace
      </h1>
      <p class="mt-2 text-[14px] text-text-secondary">
        Set up your PE OS account in under a minute.
      </p>
    </div>

    <!-- Form Card -->
    <div class="bg-white border border-border-subtle rounded-xl shadow-card p-6">
      <form id="signupForm" class="space-y-4">

        <!-- Full Name -->
        <div>
          <label class="block text-[12px] font-medium text-text-secondary mb-1.5" for="fullname">Full name</label>
          <input id="fullname" name="fullname" type="text" required placeholder="Jane Smith"
            class="w-full px-3 py-2.5 text-[14px] rounded-lg border border-border-subtle focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
        </div>

        <!-- Work Email -->
        <div>
          <label class="block text-[12px] font-medium text-text-secondary mb-1.5" for="email">Work email</label>
          <input id="email" name="email" type="email" required placeholder="jane@meridian.com"
            class="w-full px-3 py-2.5 text-[14px] rounded-lg border border-border-subtle focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
        </div>

        <!-- Firm Name -->
        <div>
          <label class="block text-[12px] font-medium text-text-secondary mb-1.5" for="firmname">Firm name</label>
          <input id="firmname" name="firmname" type="text" required placeholder="Meridian Capital Partners"
            class="w-full px-3 py-2.5 text-[14px] rounded-lg border border-border-subtle focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-[12px] font-medium text-text-secondary mb-1.5" for="password">Password</label>
          <div class="relative">
            <input id="password" name="password" type="password" required minlength="10" placeholder="Min 10 chars, upper + lower + number + special"
              class="w-full px-3 py-2.5 pr-10 text-[14px] rounded-lg border border-border-subtle focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
            <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-secondary transition">
              <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
            </button>
          </div>
          <!-- Strength bar -->
          <div id="pw-strength" class="hidden mt-2">
            <div class="flex gap-1">
              <div id="s1" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
              <div id="s2" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
              <div id="s3" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
              <div id="s4" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
            </div>
            <p id="pw-label" class="text-[11px] mt-1 text-text-muted"></p>
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-[12px] font-medium text-text-secondary mb-1.5" for="confirm_password">Confirm password</label>
          <input id="confirm_password" name="confirm_password" type="password" required placeholder="Re-enter password"
            class="w-full px-3 py-2.5 text-[14px] rounded-lg border border-border-subtle focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
          <p id="pw-match" class="hidden text-[11px] mt-1"></p>
        </div>

        <!-- Error / Success -->
        <div id="errorMsg" class="hidden text-[13px] text-red-600 bg-red-50 p-3 rounded-lg text-center"></div>
        <div id="successMsg" class="hidden text-[13px] text-secondary bg-secondary-light p-3 rounded-lg text-center"></div>

        <!-- Submit -->
        <button id="submitBtn" type="submit"
          class="w-full flex items-center justify-center gap-2 py-3 px-4 text-[14px] font-semibold text-white rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          style="background:#003366">
          <span id="submitText">Create workspace</span>
          <span id="submitSpinner" class="hidden">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-[11px] text-center text-text-muted mt-4 leading-relaxed">
      By creating a workspace you agree to our
      <a class="text-primary hover:underline" href="terms-of-service.html">Terms</a> and
      <a class="text-primary hover:underline" href="privacy-policy.html">Privacy Policy</a>.
    </p>

    <!-- Stats row -->
    <div class="mt-8 pt-6 border-t border-border-subtle grid grid-cols-3 gap-4 text-center">
      <div>
        <div class="font-display text-[18px] font-bold text-primary">&lt; 3min</div>
        <div class="text-[10px] text-text-muted uppercase tracking-wider mt-0.5">To first insight</div>
      </div>
      <div>
        <div class="font-display text-[18px] font-bold text-primary">No prompts</div>
        <div class="text-[10px] text-text-muted uppercase tracking-wider mt-0.5">Pre-loaded context</div>
      </div>
      <div>
        <div class="font-display text-[18px] font-bold text-primary">SOC 2</div>
        <div class="text-[10px] text-text-muted uppercase tracking-wider mt-0.5">Enterprise ready</div>
      </div>
    </div>

  </div>
</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/auth.js"></script>

<script>
(function() {
  const $ = id => document.getElementById(id);

  // Toggle password visibility
  $('toggle-pw').addEventListener('click', () => {
    const pw = $('password');
    const icon = $('toggle-pw').querySelector('.material-symbols-outlined');
    if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
    else { pw.type = 'password'; icon.textContent = 'visibility'; }
  });

  // Password strength
  $('password').addEventListener('input', function() {
    const pw = this.value;
    $('pw-strength').classList.toggle('hidden', pw.length === 0);
    let str = 0;
    if (pw.length >= 10) str++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) str++;
    if (/[0-9]/.test(pw)) str++;
    if (/[^A-Za-z0-9]/.test(pw)) str++;

    const colors = ['bg-red-500','bg-orange-500','bg-yellow-500','bg-green-500'];
    const labels = ['Weak','Fair','Good','Strong'];
    for (let i = 1; i <= 4; i++) {
      $('s'+i).className = `h-1 flex-1 rounded transition-colors ${i <= str ? colors[str-1] : 'bg-gray-200'}`;
    }
    $('pw-label').textContent = str > 0 ? labels[str-1] : '';
  });

  // Password match
  $('confirm_password').addEventListener('input', function() {
    const el = $('pw-match');
    if (this.value.length === 0) { el.classList.add('hidden'); return; }
    el.classList.remove('hidden');
    if (this.value === $('password').value) {
      el.textContent = 'Passwords match';
      el.className = 'text-[11px] mt-1 text-green-600';
    } else {
      el.textContent = 'Passwords do not match';
      el.className = 'text-[11px] mt-1 text-red-500';
    }
  });

  // Form submit
  $('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const fullname = $('fullname').value.trim();
    const email = $('email').value.trim();
    const password = $('password').value;
    const confirmPass = $('confirm_password').value;
    const firmname = $('firmname').value.trim();

    $('errorMsg').classList.add('hidden');
    $('successMsg').classList.add('hidden');

    if (password !== confirmPass) {
      $('errorMsg').textContent = 'Passwords do not match.';
      $('errorMsg').classList.remove('hidden');
      return;
    }
    if (password.length < 10) {
      $('errorMsg').textContent = 'Password must be at least 10 characters.';
      $('errorMsg').classList.remove('hidden');
      return;
    }
    if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password) || !/[^A-Za-z0-9]/.test(password)) {
      $('errorMsg').textContent = 'Password needs uppercase, lowercase, number, and special character.';
      $('errorMsg').classList.remove('hidden');
      return;
    }

    $('submitBtn').disabled = true;
    $('submitText').textContent = 'Creating workspace...';
    $('submitSpinner').classList.remove('hidden');

    try {
      const { user, session, error } = await PEAuth.signUp(email, password, {
        fullName: fullname,
        firmName: firmname,
      });

      if (error) throw error;
      if (!user) throw new Error('Failed to create account');

      if (session) {
        $('successMsg').textContent = 'Account created! Redirecting to setup...';
        $('successMsg').classList.remove('hidden');
        setTimeout(() => { window.location.href = 'onboarding.html'; }, 1200);
      } else {
        $('successMsg').textContent = 'Check your email to verify your account, then log in.';
        $('successMsg').classList.remove('hidden');
        $('submitBtn').disabled = true;
        $('submitText').textContent = 'Check your email';
        $('submitSpinner').classList.add('hidden');
      }
    } catch (err) {
      let msg = 'An error occurred. Please try again.';
      if (err.message) {
        if (err.message.includes('already registered')) msg = 'An account with this email already exists. Please log in.';
        else msg = err.message;
      }
      $('errorMsg').textContent = msg;
      $('errorMsg').classList.remove('hidden');
      $('submitBtn').disabled = false;
      $('submitText').textContent = 'Create workspace';
      $('submitSpinner').classList.add('hidden');
    }
  });

  // Auth check on load
  document.addEventListener('DOMContentLoaded', async function() {
    try {
      await PEAuth.initSupabase();
      const notAuth = await PEAuth.checkNotAuth();
      if (notAuth) $('loadingScreen').style.display = 'none';
    } catch {
      $('loadingScreen').style.display = 'none';
    }
  });
})();
</script>
</body>
</html>
