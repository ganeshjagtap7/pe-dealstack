<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internal — AI Usage</title>
  <link rel="stylesheet" href="/css/skeleton.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #F8F9FA; margin: 0; padding: 24px; color: #1f2937; }
    h1 { color: #003366; margin: 0 0 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #e5e7eb; }
    .tab { padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; user-select: none; }
    .tab.active { border-bottom-color: #003366; color: #003366; font-weight: 600; }
    .tab:hover { background: #f1f5f9; }
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.04); border-radius: 6px; overflow: hidden; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    th { background: #f8fafc; font-weight: 600; color: #475569; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tbody tr:hover { background: #f8fafc; }
    .anomaly { background: #fef3c7; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; display: inline-block; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-error { background: #fee2e2; color: #991b1b; }
    .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; background: white; }
    .filters label { font-size: 13px; color: #475569; display: flex; align-items: center; gap: 4px; }
    button { padding: 6px 12px; border: 1px solid #003366; background: white; color: #003366; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button.danger { color: #991b1b; border-color: #991b1b; }
    button:hover { background: #f8fafc; }
    button.danger:hover { background: #fef2f2; }
    .empty { padding: 24px; text-align: center; color: #94a3b8; font-style: italic; }
    .loading { padding: 24px; color: #94a3b8; }
    canvas { background: white; border-radius: 6px; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    h3 { margin: 24px 0 12px; color: #475569; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <h1>Internal — AI Usage</h1>
  <div class="tabs">
    <div class="tab active" data-tab="feed">Live Feed</div>
    <div class="tab" data-tab="leaderboard">User Leaderboard</div>
    <div class="tab" data-tab="breakdown">Cost Breakdown</div>
  </div>
  <div id="tab-feed" class="tab-panel"></div>
  <div id="tab-leaderboard" class="tab-panel" hidden></div>
  <div id="tab-breakdown" class="tab-panel" hidden></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/internal/usage.js"></script>
</body>
</html>
